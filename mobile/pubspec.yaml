name: mobile
description: "SuperApp de Servicios Locales"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # HTTP y estado
  dio: ^5.9.0
  provider: ^6.1.5

  # UI
  cached_network_image: ^3.4.1
  flutter_rating_bar: ^4.0.1
  url_launcher: ^6.3.2
  shimmer: ^3.0.0

  # Mapas Open Source (sin Google)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Galería de imágenes
  photo_view: ^0.15.0

  # Navegación y utilidades
  go_router: ^14.8.1
  image_picker: ^1.2.1
  path: ^1.9.0
  flutter_secure_storage: ^10.0.0

  # Tiempo real — WebSocket con el backend
  socket_io_client: ^2.0.3
  flutter_svg: ^2.2.4

  # Permisos y ubicación GPS
  permission_handler: ^11.3.1
  geolocator: ^13.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.13.1
  json_serializable: ^6.13.1

flutter:
  uses-material-design: true

  assets:
    # ── Logos (tema claro y oscuro) ──────────────────────────
    - assets/images/logo/

    # ── Imágenes promocionales (banners, hero, etc.) ─────────
    - assets/images/promotional/

    # ── Imágenes de onboarding / splash ──────────────────────
    - assets/images/onboarding/

    # ── Íconos SVG o PNG personalizados ──────────────────────
    - assets/icons/

    # ── Pasarela Yape (QR y logo) ────────────────────────────
    - assets/images/yape/

