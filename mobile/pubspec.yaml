name: mobile
description: "SuperApp de Servicios Locales"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # HTTP y estado
  dio: ^5.9.0
  provider: ^6.1.5

  # UI
  cached_network_image: ^3.4.1
  flutter_rating_bar: ^4.0.1
  url_launcher: ^6.3.2
  shimmer: ^3.0.0

  # Mapas Open Source (sin Google)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Galería de imágenes
  photo_view: ^0.15.0

  # Navegación y utilidades
  go_router: ^14.8.1
  image_picker: ^1.2.1
  path: ^1.9.0
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.3.5

  # Tiempo real — WebSocket con el backend
  socket_io_client: ^2.0.3
  flutter_svg: ^2.2.4

  # Permisos y ubicación GPS
  permission_handler: ^11.3.1
  geolocator: ^13.0.2

  # Firebase — autenticación social
  firebase_core: ^3.13.1
  firebase_auth: ^5.6.0
  google_sign_in: ^6.2.2
  flutter_facebook_auth: ^7.1.1

  # Monitoreo de errores en producción
  sentry_flutter: ^8.14.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.13.1
  json_serializable: ^6.13.1
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.5

# ── Configuración de ícono de app ───────────────────────────
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo/logo_light.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo/logo_light.png"

# ── Configuración de splash screen ──────────────────────────
flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#1A1A1A"
  image: assets/images/logo/logo_light.png
  image_dark: assets/images/logo/logo_dark.png
  android_12:
    image: assets/images/logo/logo_light.png
    icon_background_color: "#FFFFFF"
    image_dark: assets/images/logo/logo_dark.png
    icon_background_color_dark: "#1A1A1A"
  fullscreen: false
  android: true
  ios: true

flutter:
  uses-material-design: true

  assets:
    # ── Logos (tema claro y oscuro) ──────────────────────────
    - assets/images/logo/

    # ── Imágenes promocionales (banners, hero, etc.) ─────────
    - assets/images/promotional/

    # ── Imágenes de onboarding / splash ──────────────────────
    - assets/images/onboarding/

    # ── Íconos SVG o PNG personalizados ──────────────────────
    - assets/icons/

    # ── Pasarela Yape (QR y logo) ────────────────────────────
    - assets/images/yape/

